description = "指定されたタスクを開始する"

prompt = """
# 指定されたタスクを開始する

引数: タスクのディレクトリパス(例: `/start-task /xxx/yyy/zzz`)

## 実行方法

```bash
gemini
> /start-task make-curl-command-for-gaiketsu
```

※ ディレクトリパスはnvimtree上でgyで絶対パスをヤンク出来る。

## 手順

### ステップ1: タスク内容について書かれたドキュメントの内容を確認

タスク内容について書かれたドキュメントの内容を確認する。
指定ドキュメント: {{args}}

### ステップ2: 疑問点を解消する

疑問点があればユーザに問う。
特に無ければ疑問点は無しとして次のステップへ進む。

### ステップ3: 作業を行う

適宜ユーザとコミュニケーションしながら作業を行う。
適するスキルやサブエージェントがあれば使用する。

### ステップ4: ユーザに完了確認依頼する

作業結果についてユーザに完了を確認依頼する。
問題が有れば、ステップ3に戻り再度必要な作業を行う。
完了確認が得られれば、次のステップへ進む。

### ステップ5: サマリと振り返り

今回の作業の結果を、同一ディレクトリにtask-result.mdとして出力する。
以下の内容は最低限含める。
- 作業日や時間
- サマリ（タスクの概要や作業内容や作業結果など）
- 行った作業内容の詳細
- ナレッジ（ユーザに質問された技術知識やハマりポイントや注意点、覚えておくと良いことなど）
"""

